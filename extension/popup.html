<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="bar">
      <div class="brand">
        <span class="logo">▶</span>
        <span>VideoPro</span>
      </div>
      <div id="appStatus" class="status status--checking" title="">
        <span class="dot"></span><span id="appStatusText">Checking app…</span>
      </div>
    </header>

    <div id="list" class="list"></div>

    <div id="empty" class="empty hidden">
      <p>No videos detected on this page yet.</p>
      <p class="muted">Start playing a video, then reopen this popup.</p>
    </div>

    <footer class="bar footer">
      <span class="foot-hint">Click a video to pop it out ⤢</span>
      <button id="sendBtn" class="primary" disabled>Send all</button>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <script src="popup.js"></script>
  </body>
</html>
